name: video-streaming

services:
  postgres:
    image: postgres:17-alpine
    container_name: video-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: video_db
      POSTGRES_USER: video_user
      POSTGRES_PASSWORD: video_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U video_user -d video_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - video-network

  redis:
    image: redis:7-alpine
    container_name: video-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - video_redis_password
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lfu
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a video_redis_password --no-auth-warning ping | grep PONG
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - video-network

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: video-rabbitmq
    hostname: video-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: video_user
      RABBITMQ_DEFAULT_PASS: video_rabbit_password
      RABBITMQ_DEFAULT_VHOST: /video
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - video-network

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: video-minio
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/scripts/start.sh"]
    environment:
      MINIO_ROOT_USER: video_minio_admin
      MINIO_ROOT_PASSWORD: video_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
      - ./minio/start.sh:/scripts/start.sh:ro
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - video-network

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: video-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/init.sh"]
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: video_minio_admin
      MINIO_ROOT_PASSWORD: video_minio_password
    volumes:
      - ./minio/init.sh:/scripts/init.sh:ro
    networks:
      - video-network

  nginx:
    image: nginx:1.29-alpine
    container_name: video-nginx
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8088:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1/healthz | grep -q ok
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - video-network

networks:
  video-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  minio-data: