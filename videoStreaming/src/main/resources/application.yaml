spring:
  application:
    name: videoStreaming
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

  datasource:
    url: jdbc:postgresql://localhost:5433/video_db
    username: video_user
    password: video_password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: localhost
    port: 5672
    username: video_user
    password: video_rabbit_password
    virtual-host: /video
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket-name: video-bucket
  redis:
    host: localhost
    port: 6379
    password: video_redis_password

